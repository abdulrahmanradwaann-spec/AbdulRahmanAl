<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عبد الرحمن تكنولوجيا | الدليل الشامل للذكاء الاصطناعي</title>
    <!-- Font Awesome 6 (أحدث إصدار) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <!-- Google Fonts مع خطوط متغيرة لتحسين الأداء -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400..700&family=Plus+Jakarta+Sans:wght@300..800&display=swap">
    <style>
        /* ========== المتغيرات المحسنة ونظام الألوان الجديد ========== */
        :root {
            /* الألوان الأساسية مع تحسين التدرج */
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --primary-dark: #1d4ed8;
            --secondary: #7c3aed;
            --accent: #db2777;
            --success: #10b981;
            --warning: #f59e0b;
            
            /* خلفيات وأسطح محسنة */
            --bg-light: #f9fafb;
            --bg-dark: #030712;
            --surface-light: rgba(255, 255, 255, 0.8);
            --surface-dark: rgba(17, 24, 39, 0.8);
            
            /* النصوص بتباين أفضل */
            --text-light: #111827;
            --text-dark: #f3f4f6;
            --text-muted-light: #4b5563;
            --text-muted-dark: #9ca3af;
            
            /* الحدود والظلال */
            --border-light: rgba(0, 0, 0, 0.08);
            --border-dark: rgba(255, 255, 255, 0.08);
            --shadow-sm: 0 4px 6px -2px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 20px 25px -8px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            --shadow-lg: 0 30px 40px -15px rgba(0, 0, 0, 0.2);
            --shadow-hover: 0 40px 60px -20px rgba(37, 99, 235, 0.5);
            --shadow-inner: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
            
            /* التحولات والحركات */
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            
            /* تحجيم متجاوب للخطوط باستخدام clamp */
            --font-xs: clamp(0.75rem, 2vw, 0.875rem);
            --font-sm: clamp(0.875rem, 2.5vw, 1rem);
            --font-base: clamp(1rem, 3vw, 1.125rem);
            --font-lg: clamp(1.125rem, 3.5vw, 1.25rem);
            --font-xl: clamp(1.25rem, 4vw, 1.5rem);
            --font-2xl: clamp(1.5rem, 5vw, 1.875rem);
            --font-3xl: clamp(1.875rem, 6vw, 2.25rem);
            --font-4xl: clamp(2.25rem, 7vw, 3rem);
            --font-5xl: clamp(3rem, 8vw, 3.75rem);
        }

        /* الوضع الداكن التلقائي */
        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #3b82f6;
                --primary-light: #60a5fa;
                --primary-dark: #2563eb;
                --bg-light: #030712;
                --bg-dark: #111827;
                --surface-light: rgba(17, 24, 39, 0.8);
                --surface-dark: rgba(3, 7, 18, 0.9);
                --text-light: #f3f4f6;
                --text-dark: #111827;
                --text-muted-light: #9ca3af;
                --text-muted-dark: #4b5563;
                --border-light: rgba(255, 255, 255, 0.08);
                --border-dark: rgba(0, 0, 0, 0.08);
            }
        }

        /* إعادة تعيين متقدم */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Cairo', sans-serif;
            background: var(--bg-light);
            color: var(--text-light);
            min-height: 100vh;
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة ديناميكية */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 0% 0%, rgba(37, 99, 235, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 100% 0%, rgba(124, 58, 237, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(219, 39, 119, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(16, 185, 129, 0.03) 0%, transparent 50%);
            z-index: -1;
            pointer-events: none;
            animation: backgroundShift 30s ease-in-out infinite alternate;
        }

        @keyframes backgroundShift {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        /* تحسين الحاوية */
        .container {
            width: min(1440px, 100% - 2rem);
            margin-inline: auto;
            padding: 1rem;
            position: relative;
            z-index: 10;
        }

        /* ========== الهيدر المحسن ========== */
        .header {
            padding: clamp(2rem, 5vw, 4rem) 0;
            text-align: center;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            font-size: var(--font-5xl);
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5em;
            animation: gradientFlow 8s ease infinite, float 6s ease-in-out infinite;
            text-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* حاوية الكتابة */
        .typing-container {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--surface-light);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-light);
            border-radius: 100px;
            padding: 0.75rem 2rem;
            box-shadow: var(--shadow-md);
            font-size: var(--font-lg);
            color: var(--primary);
            font-weight: 500;
            margin-top: 1rem;
        }

        #typingText {
            direction: ltr;
            font-family: 'Plus Jakarta Sans', monospace;
            min-width: 200px;
        }

        .cursor {
            width: 3px;
            height: 1.5em;
            background: currentColor;
            border-radius: 3px;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ========== شريط البحث المتطور ========== */
        .search-section {
            margin: 3rem 0 4rem;
            display: flex;
            justify-content: center;
        }

        .search-wrapper {
            position: relative;
            width: min(600px, 100%);
            transition: transform var(--transition-base);
        }

        .search-wrapper:focus-within {
            transform: scale(1.02);
        }

        .search-wrapper input {
            width: 100%;
            padding: 1.25rem 3.5rem 1.25rem 2rem;
            border: 2px solid transparent;
            border-radius: 100px;
            background: var(--surface-light);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            font-size: var(--font-base);
            font-family: inherit;
            color: inherit;
            box-shadow: var(--shadow-md);
            transition: all var(--transition-base);
            user-select: text;
        }

        .search-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15), var(--shadow-lg);
            background: var(--surface-light);
        }

        .search-wrapper i {
            position: absolute;
            left: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5rem;
            color: var(--primary);
            transition: transform var(--transition-bounce);
            pointer-events: none;
        }

        .search-wrapper:focus-within i {
            transform: translateY(-50%) rotate(10deg) scale(1.1);
        }

        /* ========== بطاقات الأقسام الرئيسية ========== */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(100%, 300px), 1fr));
            gap: 1.5rem;
            margin: 2rem 0 4rem;
        }

        .category-card {
            background: var(--surface-light);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 2rem 1.5rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-bounce);
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            opacity: 0;
            animation: cardAppear 0.5s forwards;
            animation-delay: calc(0.05s * var(--card-index, 1));
            position: relative;
            overflow: hidden;
        }

        .category-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(37, 99, 235, 0.05), transparent);
            transform: translateX(-100%);
            transition: transform 0.8s;
        }

        .category-card:hover::before {
            transform: translateX(100%);
        }

        .category-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-hover);
            border-color: var(--primary);
            background: color-mix(in srgb, var(--surface-light) 90%, var(--primary) 10%);
        }

        .category-card-icon {
            width: 5rem;
            height: 5rem;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            transition: all var(--transition-bounce);
            box-shadow: 0 10px 20px -5px var(--primary);
        }

        .category-card:hover .category-card-icon {
            transform: rotate(6deg) scale(1.1);
            box-shadow: 0 20px 30px -8px var(--primary);
        }

        .category-card h3 {
            font-size: var(--font-xl);
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-light), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .category-card p {
            font-size: var(--font-sm);
            color: var(--text-muted-light);
            line-height: 1.6;
            max-width: 250px;
            margin: 0 auto;
        }

        /* ========== رأس القسم الفرعي ========== */
        .category-header {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 0.75rem 2rem 0.75rem 1.5rem;
            background: var(--surface-light);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 100px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-md);
            transition: all var(--transition-base);
            cursor: pointer;
        }

        .category-header:hover {
            transform: translateX(10px) scale(1.02);
            border-color: var(--primary);
            box-shadow: var(--shadow-hover);
            background: color-mix(in srgb, var(--surface-light) 90%, var(--primary) 10%);
        }

        .category-icon {
            width: 3.5rem;
            height: 3.5rem;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            transition: transform var(--transition-bounce);
        }

        .category-header:hover .category-icon {
            transform: rotate(360deg) scale(1.1);
        }

        .category-title {
            font-size: var(--font-2xl);
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-light), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* ========== شبكة الأدوات ========== */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr));
            gap: 1.5rem;
        }

        .tool-card {
            background: var(--surface-light);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.8rem 1.5rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            transition: all var(--transition-bounce);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: cardAppear 0.5s forwards;
            animation-delay: calc(0.02s * var(--card-index, 1));
        }

        @keyframes cardAppear {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .tool-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
            transform: scaleX(0);
            transition: transform var(--transition-base);
            transform-origin: right;
        }

        .tool-card:hover::before {
            transform: scaleX(1);
            transform-origin: left;
        }

        .tool-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-hover);
            border-color: transparent;
            background: color-mix(in srgb, var(--surface-light) 90%, var(--primary) 10%);
        }

        .card-icon {
            width: 4rem;
            height: 4rem;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(124, 58, 237, 0.1));
            border-radius: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 1.2rem;
            transition: all var(--transition-bounce);
            box-shadow: var(--shadow-inner);
        }

        .tool-card:hover .card-icon {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            transform: rotate(6deg) scale(1.15);
            box-shadow: 0 10px 20px -8px var(--primary);
        }

        .tool-name {
            font-size: var(--font-lg);
            font-weight: 700;
            margin-bottom: 0.5rem;
            line-height: 1.3;
            transition: color var(--transition-fast);
        }

        .tool-card:hover .tool-name {
            color: var(--primary);
        }

        .tool-desc {
            font-size: var(--font-sm);
            color: var(--text-muted-light);
            margin-bottom: 1.2rem;
            flex: 1;
            line-height: 1.6;
        }

        .tool-link {
            display: inline-flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: rgba(37, 99, 235, 0.1);
            border-radius: 50px;
            color: inherit;
            text-decoration: none;
            font-weight: 600;
            font-size: var(--font-sm);
            transition: all var(--transition-base);
            border: 1px solid rgba(37, 99, 235, 0.2);
            align-self: flex-start;
            margin-top: 0.5rem;
            width: 100%;
            max-width: 140px;
        }

        .tool-link:hover {
            background: var(--primary);
            color: white;
            gap: 1rem;
            border-color: transparent;
            box-shadow: 0 10px 20px -8px var(--primary);
            transform: translateX(-5px);
        }

        .tool-link i {
            font-size: 0.9rem;
            transition: transform var(--transition-fast);
        }

        .tool-link:hover i {
            transform: translateX(-5px);
        }

        /* ========== روابط العودة ========== */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 2rem;
            padding: 0.75rem 1.8rem;
            background: var(--surface-light);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50px;
            border: 1px solid var(--border-light);
            color: inherit;
            text-decoration: none;
            font-weight: 600;
            transition: all var(--transition-base);
            box-shadow: var(--shadow-sm);
        }

        .back-link:hover {
            background: var(--primary);
            color: white;
            gap: 1.2rem;
            border-color: transparent;
            box-shadow: var(--shadow-hover);
            transform: translateX(5px);
        }

        /* ========== رسالة عدم وجود نتائج ========== */
        #noResults {
            text-align: center;
            padding: 4rem 1rem;
            font-size: var(--font-xl);
            color: var(--text-muted-light);
            display: none;
            animation: fadeIn 0.5s;
            background: var(--surface-light);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 3rem;
            margin: 3rem 0;
            border: 1px solid var(--border-light);
        }

        #noResults i {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== زر العودة للأعلى ========== */
        .back-to-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 3.5rem;
            height: 3.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            transition: all var(--transition-bounce);
            border: 2px solid rgba(255, 255, 255, 0.3);
            z-index: 99;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }

        .back-to-top:hover {
            transform: scale(1.2) rotate(360deg);
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            box-shadow: 0 20px 30px -10px var(--secondary);
        }

        .back-to-top i {
            font-size: 1.5rem;
        }

        /* ========== الفوتر المحسن ========== */
        .footer {
            text-align: center;
            padding: 2rem 0;
            margin-top: 4rem;
            border-top: 1px solid var(--border-light);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            background: var(--surface-light);
            font-size: var(--font-sm);
        }

        .footer .copyright {
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        /* ========== تحسينات الوضع الداكن ========== */
        @media (prefers-color-scheme: dark) {
            .category-card p,
            .tool-desc {
                color: var(--text-muted-dark);
            }
        }

        /* ========== تحسينات التجاوب ========== */
        @media (max-width: 768px) {
            .typing-container {
                padding: 0.6rem 1.5rem;
            }
            
            .category-header {
                padding: 0.5rem 1.5rem 0.5rem 1rem;
            }
            
            .category-icon {
                width: 2.8rem;
                height: 2.8rem;
                font-size: 1.2rem;
            }
            
            .back-to-top {
                bottom: 1rem;
                right: 1rem;
                width: 3rem;
                height: 3rem;
            }
            
            .back-to-top i {
                font-size: 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 0.5rem;
            }
            
            .search-wrapper input {
                padding: 1rem 2.5rem 1rem 1.5rem;
            }
            
            .search-wrapper i {
                left: 1rem;
                font-size: 1.2rem;
            }
            
            .category-card-icon {
                width: 4rem;
                height: 4rem;
                font-size: 2rem;
            }
            
            .tool-link {
                max-width: 100%;
                justify-content: center;
            }
        }

        /* منع السحب والنسخ (محسن) */
        img, a, i {
            -webkit-user-drag: none;
            user-drag: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>عبد الرحمن تكنولوجيا</h1>
            <div class="typing-container">
                <span id="typingText"></span>
                <span class="cursor"></span>
            </div>
        </header>

        <!-- شريط البحث (يظهر في كلا الوضعين) -->
        <div class="search-section" id="searchSection">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="ابحث عن أداة ذكاء اصطناعي...">
                <i class="fas fa-search"></i>
            </div>
        </div>

        <!-- حاوية المحتوى (سيتم ملؤها ديناميكياً) -->
        <div id="contentContainer"></div>
        <div id="noResults">
            <i class="fas fa-exclamation-circle"></i>
            <div>لا توجد أدوات تطابق بحثك. جرب كلمة أخرى!</div>
        </div>
    </div>

    <div class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </div>

    <footer class="footer">
        <p class="copyright">© 2026 Abdulrahman Radwan. جميع الحقوق محفوظة.</p>
        <p>تصميم فاخر بتقنيات 2026 | دليل AI الشامل </p>
    </footer>

        // ------------------------------------------------------------
        // المتغيرات العامة
        // ------------------------------------------------------------
        const textElement = document.getElementById('typingText');
        const phrases = ["دليل متكامل لأدوات الذكاء الاصطناعي", "اكتشف المستقبل اليوم", "أحدث تقنيات 2026", "أدوات AI احترافية"];
        let phraseIndex = 0, charIndex = 0, isDeleting = false;
        let currentCategoryIndex = null; // null يعني الوضع الرئيسي
        let searchTimeout; // للتحكم في debounce

        // ------------------------------------------------------------
        // تأثير الكتابة
        // ------------------------------------------------------------
        function typeEffect() {
            const currentPhrase = phrases[phraseIndex];
            if (isDeleting) {
                textElement.innerHTML = currentPhrase.substring(0, charIndex - 1);
                charIndex--;
                if (charIndex === 0) {
                    isDeleting = false;
                    phraseIndex = (phraseIndex + 1) % phrases.length;
                    setTimeout(typeEffect, 400);
                    return;
                }
            } else {
                textElement.innerHTML = currentPhrase.substring(0, charIndex + 1);
                charIndex++;
                if (charIndex === currentPhrase.length) {
                    isDeleting = true;
                    setTimeout(typeEffect, 2000);
                    return;
                }
            }
            setTimeout(typeEffect, isDeleting ? 60 : 120);
        }
        setTimeout(typeEffect, 1000);

        // ------------------------------------------------------------
        // دوال العرض
        // ------------------------------------------------------------

        // عرض الصفحة الرئيسية (قائمة الأقسام)
        function renderMainPage() {
            document.title = "عبد الرحمن تكنولوجيا | الدليل الشامل للذكاء الاصطناعي";
            const container = document.getElementById('contentContainer');
            container.innerHTML = `
                <div class="categories-grid">
                    ${categories.map((cat, index) => `
                        <a href="?index=${index}" class="category-card" style="--card-index: ${index + 1};">
                            <div class="category-card-icon"><i class="${cat.icon}"></i></div>
                            <h3>${cat.name}</h3>
                            <p>${cat.tools.length} أداة متاحة</p>
                        </a>
                    `).join('')}
                </div>
            `;
            document.getElementById('noResults').style.display = 'none';
            document.getElementById('searchInput').value = '';
            document.getElementById('searchInput').placeholder = 'ابحث عن أداة ذكاء اصطناعي...';
        }

        // عرض أدوات قسم معين
        function renderCategoryPage(index) {
            const cat = categories[index];
            if (!cat) {
                window.location.href = window.location.pathname;
                return;
            }
            currentCategoryIndex = index;
            document.title = `${cat.name} | عبد الرحمن تكنولوجيا`;
            const container = document.getElementById('contentContainer');
            container.innerHTML = `
                <a href="${window.location.pathname}" class="back-link">
                    <i class="fa-solid fa-arrow-right"></i> العودة إلى جميع الأقسام
                </a>
                <div class="category-header" onclick="window.location.href='${window.location.pathname}'">
                    <div class="category-icon"><i class="${cat.icon}"></i></div>
                    <h2 class="category-title">${cat.name}</h2>
                </div>
                <div class="tools-grid" id="toolsGrid">
                    ${cat.tools.map((tool, idx) => `
                        <div class="tool-card" style="--card-index: ${idx + 1};">
                            <div class="card-icon"><i class="${tool.icon}"></i></div>
                            <h3 class="tool-name">${tool.name}</h3>
                            <p class="tool-desc">${tool.desc}</p>
                            <a href="${tool.url}" class="tool-link" target="_blank" rel="noopener noreferrer">
                                <span>زيارة</span>
                                <i class="fa-solid fa-arrow-left"></i>
                            </a>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('searchInput').placeholder = `ابحث في ${cat.name}...`;
            document.getElementById('searchInput').value = '';
            document.getElementById('noResults').style.display = 'none';
        }

        // البحث مع debounce لتحسين الأداء
        function debounceFilter() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                filterTools();
            }, 300);
        }

        function filterTools() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const noResults = document.getElementById('noResults');
            
            if (currentCategoryIndex === null) {
                // الوضع الرئيسي
                const container = document.getElementById('contentContainer');
                if (query === '') {
                    renderMainPage();
                    return;
                }
                const filteredCategories = categories.filter(cat =>
                    cat.name.toLowerCase().includes(query) ||
                    cat.tools.some(tool => tool.name.toLowerCase().includes(query) || tool.desc.toLowerCase().includes(query))
                );
                if (filteredCategories.length === 0) {
                    container.innerHTML = '';
                    noResults.style.display = 'block';
                } else {
                    container.innerHTML = `
                        <div class="categories-grid">
                            ${filteredCategories.map((cat, index) => {
                                const originalIndex = categories.findIndex(c => c.name === cat.name);
                                return `
                                    <a href="?index=${originalIndex}" class="category-card" style="--card-index: ${index + 1};">
                                        <div class="category-card-icon"><i class="${cat.icon}"></i></div>
                                        <h3>${cat.name}</h3>
                                        <p>${cat.tools.length} أداة متاحة</p>
                                    </a>
                                `;
                            }).join('')}
                        </div>
                    `;
                    noResults.style.display = 'none';
                }
            } else {
                // وضع القسم
                const cat = categories[currentCategoryIndex];
                const toolsGrid = document.getElementById('toolsGrid');
                if (!toolsGrid) return;
                
                if (query === '') {
                    toolsGrid.innerHTML = cat.tools.map((tool, idx) => `
                        <div class="tool-card" style="--card-index: ${idx + 1};">
                            <div class="card-icon"><i class="${tool.icon}"></i></div>
                            <h3 class="tool-name">${tool.name}</h3>
                            <p class="tool-desc">${tool.desc}</p>
                            <a href="${tool.url}" class="tool-link" target="_blank" rel="noopener noreferrer">
                                <span>زيارة</span>
                                <i class="fa-solid fa-arrow-left"></i>
                            </a>
                        </div>
                    `).join('');
                    noResults.style.display = 'none';
                } else {
                    const filtered = cat.tools.filter(tool =>
                        tool.name.toLowerCase().includes(query) || tool.desc.toLowerCase().includes(query)
                    );
                    if (filtered.length === 0) {
                        toolsGrid.innerHTML = '';
                        noResults.style.display = 'block';
                    } else {
                        toolsGrid.innerHTML = filtered.map((tool, idx) => `
                            <div class="tool-card" style="--card-index: ${idx + 1};">
                                <div class="card-icon"><i class="${tool.icon}"></i></div>
                                <h3 class="tool-name">${tool.name}</h3>
                                <p class="tool-desc">${tool.desc}</p>
                                <a href="${tool.url}" class="tool-link" target="_blank" rel="noopener noreferrer">
                                    <span>زيارة</span>
                                    <i class="fa-solid fa-arrow-left"></i>
                                </a>
                            </div>
                        `).join('');
                        noResults.style.display = 'none';
                    }
                }
            }
        }

        // ------------------------------------------------------------
        // التهيئة عند تحميل الصفحة
        // ------------------------------------------------------------
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const catIndex = urlParams.get('index');
            
            if (catIndex !== null) {
                renderCategoryPage(parseInt(catIndex));
            } else {
                renderMainPage();
                currentCategoryIndex = null;
            }

            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', debounceFilter);
        };

        // منع النسخ وأدوات المطور (اختياري - يمكن إزالته إذا أردت)
        document.addEventListener('keydown', e => {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'x' || e.key === 'v' || e.key === 's' || e.key === 'p')) {
                e.preventDefault();
                alert("النسخ غير مسموح به.");
            }
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
                e.preventDefault();
                alert("أدوات المطور مقفلة.");
            }
        });
        document.addEventListener('contextmenu', e => {
            e.preventDefault();
            alert("النقر بالزر الأيمن غير متاح.");
        });
    </script>
</body>
</html>
